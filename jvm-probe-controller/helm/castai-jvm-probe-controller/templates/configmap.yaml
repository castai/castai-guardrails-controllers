apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-jvm-probe-controller-config
  namespace: {{ .Release.Namespace | default "castai-agent" }}
  labels:
    {{- include "castai-jvm-probe-controller.labels" . | nindent 4 }}
data:
  # Probe defaults
  livenessInitialDelaySeconds: "{{ .Values.config.probeDefaults.liveness.initialDelaySeconds }}"
  livenessPeriodSeconds: "{{ .Values.config.probeDefaults.liveness.periodSeconds }}"
  livenessTimeoutSeconds: "{{ .Values.config.probeDefaults.liveness.timeoutSeconds }}"
  livenessFailureThreshold: "{{ .Values.config.probeDefaults.liveness.failureThreshold }}"

  readinessInitialDelaySeconds: "{{ .Values.config.probeDefaults.readiness.initialDelaySeconds }}"
  readinessPeriodSeconds: "{{ .Values.config.probeDefaults.readiness.periodSeconds }}"
  readinessTimeoutSeconds: "{{ .Values.config.probeDefaults.readiness.timeoutSeconds }}"
  readinessFailureThreshold: "{{ .Values.config.probeDefaults.readiness.failureThreshold }}"

  startupInitialDelaySeconds: "{{ .Values.config.probeDefaults.startup.initialDelaySeconds }}"
  startupPeriodSeconds: "{{ .Values.config.probeDefaults.startup.periodSeconds }}"
  startupTimeoutSeconds: "{{ .Values.config.probeDefaults.startup.timeoutSeconds }}"
  startupFailureThreshold: "{{ .Values.config.probeDefaults.startup.failureThreshold }}"

  # Auto-fix settings
  autoFixMode: "{{ .Values.config.autoFixMode }}"
  autoFixThreshold: "{{ .Values.config.autoFixThreshold }}"
  maxInitialDelay: "{{ .Values.config.maxInitialDelay }}"
  alwaysInjectStartupProbe: "{{ .Values.config.alwaysInjectStartupProbe }}"
  logInterval: "{{ .Values.config.logInterval }}"

  {{- if .Values.config.exclusions }}
  exclusions: '{{ .Values.config.exclusions | toJson }}'
  {{- else }}
  exclusions: "[]"
  {{- end }}