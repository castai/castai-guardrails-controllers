# Multi-zone test - 10 replicas to force spreading
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-multi-zone-a
  namespace: default
  labels:
    app: test-multi-zone-a
    test-type: multi-zone
    zone-test: zone-a
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test-multi-zone-a
  template:
    metadata:
      labels:
        app: test-multi-zone-a
        test-type: multi-zone
        zone-test: zone-a
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
