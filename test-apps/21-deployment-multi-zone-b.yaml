apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-multi-zone-b
  namespace: default
  labels:
    app: test-multi-zone-b
    test-type: multi-zone
    zone-test: zone-b
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test-multi-zone-b
  template:
    metadata:
      labels:
        app: test-multi-zone-b
        test-type: multi-zone
        zone-test: zone-b
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
