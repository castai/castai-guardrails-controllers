# This deployment has bypass annotation - TSC should NOT be added
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-bypass-tsc
  namespace: default
  annotations:
    workloads.cast.ai/tsc-bypass: "true"
  labels:
    app: test-app-bypass-tsc
    test-type: tsc-bypass
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-app-bypass-tsc
  template:
    metadata:
      labels:
        app: test-app-bypass-tsc
        test-type: tsc-bypass
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
