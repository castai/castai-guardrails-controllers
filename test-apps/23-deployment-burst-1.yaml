# Burst test - 15 replicas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-burst-1
  namespace: default
  labels:
    app: test-burst-1
    test-type: burst-test
spec:
  replicas: 15
  selector:
    matchLabels:
      app: test-burst-1
  template:
    metadata:
      labels:
        app: test-burst-1
        test-type: burst-test
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
