# Test TSC Controller - StatefulSet without TSC
# Using an in-memory emptyDir to avoid PVC dependencies
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-sts-no-tsc
  namespace: default
  labels:
    app: test-sts-no-tsc
    test-type: tsc-validation
spec:
  serviceName: test-sts-headless
  replicas: 3
  selector:
    matchLabels:
      app: test-sts-no-tsc
  template:
    metadata:
      labels:
        app: test-sts-no-tsc
        test-type: tsc-validation
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
          # Use emptyDir instead of PVC for testing
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: test-sts-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    app: test-sts-no-tsc
  ports:
    - port: 80
      targetPort: 80
