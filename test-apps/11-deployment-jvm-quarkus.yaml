# Test JVM Probe Controller - Quarkus detection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-jvm-quarkus
  namespace: default
  labels:
    app: test-jvm-quarkus
    test-type: jvm-probe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-jvm-quarkus
  template:
    metadata:
      labels:
        app: test-jvm-quarkus
        test-type: jvm-probe
    spec:
      containers:
        - name: quarkus-app
          # Using nginx as base with Quarkus env vars (controller detects from env)
          image: nginx:alpine
          env:
            - name: QUARKUS_HTTP_PORT
              value: "8080"
            - name: QUARKUS_PROFILE
              value: "prod"
            - name: JAVA_HOME
              value: "/opt/java/openjdk"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-jvm-quarkus
  namespace: default
spec:
  selector:
    app: test-jvm-quarkus
  ports:
    - port: 8080
      targetPort: 8080
