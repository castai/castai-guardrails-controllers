# Test JVM Probe Controller - Auto-fix poor probes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-jvm-poor-probes
  namespace: default
  annotations:
    # Enable detailed failure logging
    workloads.cast.ai/jvm-probe-log-failures: "true"
  labels:
    app: test-jvm-poor-probes
    test-type: jvm-auto-fix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-jvm-poor-probes
  template:
    metadata:
      labels:
        app: test-jvm-poor-probes
        test-type: jvm-auto-fix
    spec:
      containers:
        - name: spring-app
          image: nginx:alpine
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_HOME
              value: "/usr/lib/jvm/java-17-openjdk"
          ports:
            - containerPort: 8080
              name: http
          # POOR probe configuration - should trigger auto-fix
          # Note: Using nginx paths since we're using nginx image for testing
          livenessProbe:
            httpGet:
              path: /  # Generic path, controller will overwrite
              port: 8080
            initialDelaySeconds: 5    # TOO SHORT for JVM!
            periodSeconds: 3          # TOO FREQUENT!
            timeoutSeconds: 1         # TOO SHORT!
            failureThreshold: 1       # TOO AGGRESSIVE!
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3    # TOO SHORT!
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 1
          # No startup probe - should be injected
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-jvm-poor-probes
  namespace: default
spec:
  selector:
    app: test-jvm-poor-probes
  ports:
    - port: 8080
      targetPort: 8080
