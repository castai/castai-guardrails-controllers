# Test JVM Probe Controller - Force overwrite existing probes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-jvm-overwrite
  namespace: default
  annotations:
    # Force overwrite all probes
    workloads.cast.ai/jvm-probe-overwrite-all: "true"
    workloads.cast.ai/jvm-probe-framework: "spring-boot"
  labels:
    app: test-jvm-overwrite
    test-type: jvm-overwrite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-jvm-overwrite
  template:
    metadata:
      labels:
        app: test-jvm-overwrite
        test-type: jvm-overwrite
    spec:
      containers:
        - name: spring-app
          image: nginx:alpine
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_HOME
              value: "/usr/lib/jvm/java-17-openjdk"
          ports:
            - containerPort: 8080
              name: http
          # These probes will be OVERWRITTEN by controller
          # Using generic paths - controller will replace with proper paths
          livenessProbe:
            httpGet:
              path: /health/wrong-path
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready/wrong-path
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-jvm-overwrite
  namespace: default
spec:
  selector:
    app: test-jvm-overwrite
  ports:
    - port: 8080
      targetPort: 8080
