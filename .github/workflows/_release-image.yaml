name: Release Image (reusable)

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT_EMAIL:
        required: true

jobs:
  build-and-push:
    name: Build & push ${{ inputs.image_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: 'projects/865213359973/locations/global/workloadIdentityPools/castai-github-wif-pool/providers/castai-castai-guardrails-control'
          service_account: 'image-writer-library@cicd-master-oxk5.iam.gserviceaccount.com'
          audience: 'https://cloud.google.com'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            us-docker.pkg.dev/castai-hub/library/${{ inputs.image_name }}:${{ inputs.version }}
            us-docker.pkg.dev/castai-hub/library/${{ inputs.image_name }}:latest
