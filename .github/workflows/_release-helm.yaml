name: Release Helm (reusable)

on:
  workflow_call:
    inputs:
      chart_name:
        required: true
        type: string
      chart_path:
        required: true
        type: string
      version:
        required: true
        type: string
      helm_repo_url:
        required: true
        type: string

jobs:
  release-helm:
    name: Release Helm chart ${{ inputs.chart_name }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Update chart and image versions
        env:
          VERSION: ${{ inputs.version }}
          CHART_PATH: ${{ inputs.chart_path }}
        run: |
          yq -i ".version = \"${VERSION}\"" "${CHART_PATH}/Chart.yaml"
          yq -i ".appVersion = \"${VERSION}\"" "${CHART_PATH}/Chart.yaml"
          yq -i ".image.tag = \"${VERSION}\"" "${CHART_PATH}/values.yaml"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Package Helm chart
        env:
          CHART_PATH: ${{ inputs.chart_path }}
        run: helm package "${CHART_PATH}"

      - name: Download existing Helm repository
        env:
          CHART_NAME: ${{ inputs.chart_name }}
          HELM_REPO_URL: ${{ inputs.helm_repo_url }}
        run: |
          mkdir -p helm-repo
          if curl -f -s "${HELM_REPO_URL}/index.yaml" -o existing-index.yaml; then
            echo "Downloaded existing index.yaml"
            chart_urls=$(grep -o "${HELM_REPO_URL}/${CHART_NAME}-[^\"]*\.tgz" existing-index.yaml || true)
            if [ -n "$chart_urls" ]; then
              echo "$chart_urls" | while read -r url; do
                filename=$(basename "$url")
                if curl -f -s "$url" -o "helm-repo/$filename"; then
                  echo "Downloaded existing chart: $filename"
                fi
              done
            fi
          else
            echo "No existing repository found, starting fresh"
          fi

      - name: Build Helm repository index
        env:
          CHART_NAME: ${{ inputs.chart_name }}
          HELM_REPO_URL: ${{ inputs.helm_repo_url }}
        run: |
          cp "${CHART_NAME}"-*.tgz helm-repo/
          if [ -f existing-index.yaml ]; then
            helm repo index helm-repo --url "${HELM_REPO_URL}" --merge existing-index.yaml
          else
            helm repo index helm-repo --url "${HELM_REPO_URL}"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: helm-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0