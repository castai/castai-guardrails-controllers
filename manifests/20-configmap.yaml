apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-tsc-controller-config
  namespace: castai-agent
  labels:
    app.kubernetes.io/component: tsc-controller
data:
  defaultConstraints: |-
    [
      {
        "maxSkew": 1,
        "topologyKey": "topology.kubernetes.io/zone",
        "whenUnsatisfiable": "DoNotSchedule",
        "labelSelector": {}
      }
    ]
  logInterval: "15m"
  reconcileInterval: "2m"
  garbageCollectInterval: "5m"
  exclusions: |-
    [
      {"namespaceRegex": "^kube-.*"},
      {"namespaceRegex": "^castai-.*"}
    ]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-jvm-probe-controller-config
  namespace: castai-agent
  labels:
    app.kubernetes.io/component: jvm-probe-controller
data:
  # Framework configurations for probe injection
  # Note: Startup probes are ALWAYS injected for JVM containers as they prevent
  # premature pod termination during slow startup (especially important for Spring Boot)
  frameworks: |-
    {
      "spring-boot": {
        "livenessPath": "/actuator/health/liveness",
        "readinessPath": "/actuator/health/readiness",
        "startupPath": "/actuator/health",
        "defaultPort": 8080,
        "initialDelaySeconds": 60,
        "periodSeconds": 10,
        "timeoutSeconds": 5,
        "failureThreshold": 3,
        "successThreshold": 1,
        "useTCPSocket": false,
        "startupProbeMultiplier": 3
      },
      "quarkus": {
        "livenessPath": "/q/health/live",
        "readinessPath": "/q/health/ready",
        "startupPath": "/q/health/started",
        "defaultPort": 8080,
        "initialDelaySeconds": 30,
        "periodSeconds": 10,
        "timeoutSeconds": 5,
        "failureThreshold": 3,
        "successThreshold": 1,
        "useTCPSocket": false,
        "startupProbeMultiplier": 2
      },
      "micronaut": {
        "livenessPath": "/health/liveness",
        "readinessPath": "/health/readiness",
        "startupPath": "/health",
        "defaultPort": 8080,
        "initialDelaySeconds": 30,
        "periodSeconds": 10,
        "timeoutSeconds": 5,
        "failureThreshold": 3,
        "successThreshold": 1,
        "useTCPSocket": false,
        "startupProbeMultiplier": 2
      },
      "generic": {
        "useTCPSocket": true,
        "defaultPort": 8080,
        "initialDelaySeconds": 30,
        "periodSeconds": 10,
        "timeoutSeconds": 5,
        "failureThreshold": 3,
        "successThreshold": 1,
        "startupProbeMultiplier": 3
      }
    }
  # Global settings
  logInterval: "15m"
  reconcileInterval: "2m"
  garbageCollectInterval: "10m"
  requireBothProbes: "false"
  skipIfAnyProbeExists: "false"
  # Always inject startup probes for JVM containers
  alwaysInjectStartupProbe: "true"
  # Probe auto-fix settings
  probeAutoFixEnabled: "true"
  failureThresholdBeforeFix: "5"
  timeWindowForFailures: "5m"
  # Maximum probe settings after auto-fix
  maxInitialDelaySeconds: "300"
  maxFailureThreshold: "10"
  exclusions: |-
    [
      {"namespaceRegex": "^kube-.*"},
      {"namespaceRegex": "^castai-.*"}
    ]
