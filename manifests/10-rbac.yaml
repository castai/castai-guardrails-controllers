apiVersion: v1
kind: ServiceAccount
metadata:
  name: castai-workload-controllers
  namespace: castai-agent
  labels:
    app.kubernetes.io/name: castai-workload-controllers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: castai-workload-controllers
  labels:
    app.kubernetes.io/name: castai-workload-controllers
rules:
  # Manage Deployments and StatefulSets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Access to pods (for reference)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Access ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: castai-workload-controllers
  labels:
    app.kubernetes.io/name: castai-workload-controllers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: castai-workload-controllers
subjects:
  - kind: ServiceAccount
    name: castai-workload-controllers
    namespace: castai-agent
