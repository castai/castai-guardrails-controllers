# Default values for castai-pdb-controller
# This chart deploys the CAST AI Pod Disruption Budget Controller

replicaCount: 2

image:
  repository: marcusarenas/castai-pdb-controller
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Controller configuration
config:
  defaultPDB:
    minAvailable: 1
    # maxUnavailable: 1  # Only one can be set (minAvailable or maxUnavailable)
    unhealthyPodEvictionPolicy: "IfHealthyBudget"
  enableForkPattern: true
  detectPoorPDBs: true
  fixPoorPDBs: true
  skipSingleReplica: true  # Skip workloads with 1 replica
  logInterval: "15m"
  pdbScanInterval: "2m"
  garbageCollectInterval: "2m"
  exclusions: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: castai-pdb-controller
          topologyKey: kubernetes.io/hostname

service:
  enabled: false
  type: ClusterIP
  port: 8080

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

rbac:
  create: true

# Pod disruption budget for the controller
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class for the controller pods
priorityClassName: ""

# Update strategy for the deployment
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0