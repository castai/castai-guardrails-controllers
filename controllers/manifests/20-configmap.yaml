apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-tsc-controller-config
  namespace: castai-agent
data:
  defaultConstraints: |
    [{"maxSkew":1,"topologyKey":"topology.kubernetes.io/zone","whenUnsatisfiable":"DoNotSchedule"}]
  skipSingleReplica: "true"
  reconcileInterval: "2m"
  garbageCollectInterval: "5m"
  logLevel: "info"
  enableTSCManagement: "true"
  dryRun: "true"
  exclusions: "[]"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-jvm-probe-controller-config
  namespace: castai-agent
data:
  frameworks: |
    {"spring-boot":{"livenessPath":"/actuator/health/liveness","readinessPath":"/actuator/health/readiness","startupPath":"/actuator/health","defaultPort":8080,"defaultStartupDelaySeconds":60,"defaultStartupTimeoutSeconds":300,"defaultStartupPeriodSeconds":10,"defaultStartupFailureThreshold":30},"quarkus":{"livenessPath":"/q/health/live","readinessPath":"/q/health/ready","startupPath":"/q/health/started","defaultPort":8080,"defaultStartupDelaySeconds":30,"defaultStartupTimeoutSeconds":180,"defaultStartupPeriodSeconds":10,"defaultStartupFailureThreshold":18},"micronaut":{"livenessPath":"/health/live","readinessPath":"/health/ready","startupPath":"/health/started","defaultPort":8080,"defaultStartupDelaySeconds":30,"defaultStartupTimeoutSeconds":180,"defaultStartupPeriodSeconds":10,"defaultStartupFailureThreshold":18},"generic":{"livenessPath":"/health","readinessPath":"/health","startupPath":"/health","defaultPort":8080,"defaultStartupDelaySeconds":90,"defaultStartupTimeoutSeconds":300,"defaultStartupPeriodSeconds":10,"defaultStartupFailureThreshold":30}}
  exclusions: "[]"
  logInterval: "15m"
  reconcileInterval: "15m"
  requireBothProbes: "true"
  skipIfAnyProbeExists: "false"
  injectLivenessProbe: "false"
  injectReadinessProbe: "true"
  injectStartupProbe: "true"
  dryRun: "true"
  logIntendedChanges: "true"
  enableProbeManagement: "true"