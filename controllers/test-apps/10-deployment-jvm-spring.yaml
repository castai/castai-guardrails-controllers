# Test JVM Probe Controller - Spring Boot detection
# Using a lightweight container that mimics Spring Boot behavior
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-jvm-spring
  namespace: default
  labels:
    app: test-jvm-spring
    test-type: jvm-probe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-jvm-spring
  template:
    metadata:
      labels:
        app: test-jvm-spring
        test-type: jvm-probe
    spec:
      containers:
        - name: spring-app
          # Using a lightweight image that simulates JVM startup
          image: k8s.gcr.io/pause:3.7
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_OPTS
              value: "-Xmx512m"
            - name: JAVA_HOME
              value: "/usr/lib/jvm/java-17-openjdk"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-jvm-spring
  namespace: default
spec:
  selector:
    app: test-jvm-spring
  ports:
    - port: 8080
      targetPort: 8080
