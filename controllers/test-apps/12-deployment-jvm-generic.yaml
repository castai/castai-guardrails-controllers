# Test JVM Probe Controller - Generic JVM detection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-jvm-generic
  namespace: default
  labels:
    app: test-jvm-generic
    test-type: jvm-probe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-jvm-generic
  template:
    metadata:
      labels:
        app: test-jvm-generic
        test-type: jvm-probe
    spec:
      containers:
        - name: java-app
          # Using nginx with Java env vars to simulate generic JVM
          image: nginx:alpine
          command: ["/bin/sh"]
          args:
            - -c
            - |
              # Simulate Java app startup time
              echo "Starting JVM..."
              sleep 10
              echo "JVM started, launching nginx..."
              nginx -g 'daemon off;'
          env:
            - name: JAVA_OPTS
              value: "-Xmx256m -XX:+UseContainerSupport"
            - name: JAVA_HOME
              value: "/usr/lib/jvm/java-17-openjdk"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-jvm-generic
  namespace: default
spec:
  selector:
    app: test-jvm-generic
  ports:
    - port: 8080
      targetPort: 8080
