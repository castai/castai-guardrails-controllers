# Default values for castai-tsc-controller
# This chart deploys the CAST AI Topology Spread Constraints Controller

replicaCount: 2

image:
  # GCP Artifact Registry (castai-hub). Use imagePullSecrets on the pod if required for your cluster.
  repository: us-docker.pkg.dev/castai-hub/library/castai-tsc-controller
  tag: "0.0.2"
  # Container image pull policy
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  defaultConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
  # Skip workloads with single replica (default: true)
  skipSingleReplica: true
  # Controller scan/reconcile interval (e.g., "2m", "5m")
  reconcileInterval: "2m"
  # Garbage collection interval for stale annotations (e.g., "5m", "10m")
  garbageCollectInterval: "5m"
  # Application log level: debug, info, warn (or warning), error
  logLevel: "info"
  # Enable/disable TSC management (allows disabling without ConfigMap change)
  enableTSCManagement: true
  # Dry-run mode: when true, only logs what would be changed without applying
  dryRun: true
  # Exclusion rules for workloads to skip TSC injection
  exclusions: "[]"

podSecurityContext: {}

securityContext: {}
