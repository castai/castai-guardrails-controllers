# Default values for castai-tsc-controller
# This chart deploys the CAST AI Topology Spread Constraints Controller

replicaCount: 2

image:
  # GCP Artifact Registry (castai-hub). Use imagePullSecrets on the pod if required for your cluster.
  repository: us-docker.pkg.dev/castai-hub/library/castai-tsc-controller
  tag: "v1.0.0"
  # Container image pull policy
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Controller configuration
config:
  # Default TopologySpreadConstraints to inject into workloads
  # Each constraint defines how pods should be spread across topology domains
  defaultConstraints:
    - maxSkew: 1
      topologyKey: "topology.kubernetes.io/zone"
      whenUnsatisfiable: "DoNotSchedule"
  # Skip workloads with 1 replica (removes TSC if previously injected)
  skipSingleReplica: true
  # Log interval for repeated messages (e.g., "15m", "1h")
  logInterval: "15m"
  # Controller scan/reconcile interval (e.g., "2m", "5m")
  reconcileInterval: "2m"
  # Garbage collection interval for stale annotations (e.g., "5m", "10m")
  garbageCollectInterval: "5m"
  # Application log level: debug, info, warn (or warning), error
  logLevel: "info"
  # Exclusion rules for workloads to skip TSC injection
  # Each rule is evaluated independently; if a workload matches ANY rule, no TSC is injected
  # Within a single rule, all specified criteria (namespaceRegex, nameRegex, labels) must match (AND logic)
  # Regular expression patterns are used for flexible matching
  # Empty strings for namespaceRegex or nameRegex, or empty object {} for labels, mean "no filter" for that criterion
  exclusions: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: castai-tsc-controller
          topologyKey: kubernetes.io/hostname

service:
  enabled: false
  type: ClusterIP
  port: 8080

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

rbac:
  create: true

# Pod disruption budget for the controller
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class for the controller pods
priorityClassName: ""

# Update strategy for the deployment
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0