apiVersion: v1
kind: ConfigMap
metadata:
  name: castai-jvm-probe-controller-config
  namespace: {{ .Release.Namespace | default "castai-agent" }}
  labels:
    {{- include "castai-jvm-probe-controller.labels" . | nindent 4 }}
data:
  # Framework configurations (JSON)
  jvm-frameworks: '{{ .Values.config.frameworks }}'

  # P1: Liveness probe safety - opt-in by default
  jvm-injectLivenessProbe: "{{ .Values.config.injectLivenessProbe }}"
  jvm-injectReadinessProbe: "{{ .Values.config.injectReadinessProbe }}"
  jvm-injectStartupProbe: "{{ .Values.config.injectStartupProbe }}"

  # P2: Dry-run / observe-only mode
  jvm-dryRun: "{{ .Values.config.dryRun }}"
  jvm-logIntendedChanges: "{{ .Values.config.logIntendedChanges }}"

  # Existing settings
  jvm-requireBothProbes: "{{ .Values.config.requireBothProbes }}"
  jvm-skipIfAnyProbeExists: "{{ .Values.config.skipIfAnyProbeExists }}"
  jvm-logInterval: "{{ .Values.config.logInterval }}"
  jvm-reconcileInterval: "{{ .Values.config.reconcileInterval }}"

  {{- if .Values.config.exclusions }}
  jvm-exclusions: '{{ .Values.config.exclusions }}'
  {{- else }}
  jvm-exclusions: "[]"
  {{- end }}