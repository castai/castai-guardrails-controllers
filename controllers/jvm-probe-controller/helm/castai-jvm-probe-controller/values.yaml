# Default values for castai-jvm-probe-controller
# This chart deploys the CAST AI JVM Probe Controller

replicaCount: 2

image:
  repository: castai/jvm-probe-controller
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Controller configuration
config:
  probeDefaults:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 30

  autoFixMode: true  # Auto-detect and fix slow startups
  autoFixThreshold: 3  # Restarts before triggering fix
  maxInitialDelay: 300  # Max seconds to increase to
  alwaysInjectStartupProbe: true
  logInterval: "15m"
  exclusions: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: castai-jvm-probe-controller
          topologyKey: kubernetes.io/hostname

service:
  enabled: false
  type: ClusterIP
  port: 8080

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

rbac:
  create: true

# Pod disruption budget for the controller
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class for the controller pods
priorityClassName: ""

# Update strategy for the deployment
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0