# Default values for castai-jvm-probe-controller
# This chart deploys the CAST AI JVM Probe Controller

replicaCount: 2

image:
  # GCP Artifact Registry (castai-hub). Use imagePullSecrets on the pod if required for your cluster.
  repository: us-docker.pkg.dev/castai-hub/library/castai-jvm-probe-controller
  tag: "0.0.4"
  # Container image pull policy
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Controller configuration (new format matching v1.1.0)
config:
  # Framework configurations (structured YAML, converted to JSON for ConfigMap)
  frameworks:
    spring-boot:
      livenessPath: "/actuator/health/liveness"
      readinessPath: "/actuator/health/readiness"
      startupPath: "/actuator/health"
      defaultPort: 8080
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      useTCPSocket: false
    quarkus:
      livenessPath: "/q/health/live"
      readinessPath: "/q/health/ready"
      startupPath: "/q/health/started"
      defaultPort: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      useTCPSocket: false
    micronaut:
      livenessPath: "/health/liveness"
      readinessPath: "/health/readiness"
      startupPath: "/health"
      defaultPort: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      useTCPSocket: false
    generic:
      livenessPath: ""
      readinessPath: ""
      startupPath: ""
      defaultPort: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
      useTCPSocket: true

  # P1: Liveness probe safety - opt-in by default (requires actuator sub-groups enabled)
  injectLivenessProbe: "false"
  injectReadinessProbe: "true"
  injectStartupProbe: "true"

  # P2: Dry-run / observe-only mode - safe default for first install
  dryRun: "true"
  logIntendedChanges: "true"

  # P3: Enable/disable probe management (allows disabling without ConfigMap change)
  enableProbeManagement: "true"

  # Existing settings
  requireBothProbes: "true"
  skipIfAnyProbeExists: "false"
  logInterval: "15m"
  reconcileInterval: "2m"
  exclusions:
    - namespaceRegex: "^kube-.*"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: castai-jvm-probe-controller
          topologyKey: kubernetes.io/hostname

service:
  enabled: false
  type: ClusterIP
  port: 8080

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

rbac:
  create: true

# Pod disruption budget for the controller
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class for the controller pods
priorityClassName: ""

# Update strategy for the deployment
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
